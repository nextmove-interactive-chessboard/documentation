<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Willkommen — Benutzername eingeben</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="maincss.css">
</head>
<body>
    <div class="card">
        <h1>Willkommen 👋</h1>
        <p>Gib deinen Benutzernamen ein, um fortzufahren.</p>

        <div class="avatar" id="avatar">—</div>

        <div class="input-wrap">
        <input type="text" id="username" placeholder="z. B. Anna42" maxlength="24" autocomplete="off">
        <button id="saveBtn">Los!</button>
        </div>
    </div>
    <div id="toast" class="toast">Gespeichert!</div>

    <script src="script.js"></script>
</body>
</html>
