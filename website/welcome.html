<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Willkommen zurück</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1724;
      --accent:#4ade80;
      --secondary:#3b82f6;
      --muted:#a0aec0;
      --radius:18px;
    }
    *{box-sizing:border-box;}
    html,body{height:100%;margin:0;padding:0;}
    body{
      font-family:'Poppins',sans-serif;
      background:radial-gradient(circle at 20% 20%,rgba(110,231,183,0.25),transparent 60%),
                 radial-gradient(circle at 80% 80%,rgba(99,102,241,0.25),transparent 60%),
                 #0f1724;
      display:flex;align-items:center;justify-content:center;flex-direction:column;color:white;
      overflow:hidden;animation:fadeInBg 2s ease forwards;
    }

    @keyframes fadeInBg{from{opacity:0;}to{opacity:1;}}

    h1{font-size:2.5rem;text-align:center;margin-bottom:0.5rem;}
    p{color:var(--muted);text-align:center;margin-bottom:2rem;}

    .card{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(12px);
      padding:2.5rem 3rem;border-radius:var(--radius);
      box-shadow:0 20px 40px rgba(0,0,0,0.4);
      max-width:480px;width:90%;text-align:center;
      animation:popUp 0.8s ease forwards;
    }

    @keyframes popUp{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}

    .avatar{
      width:100px;height:100px;border-radius:50%;margin:0 auto 1rem auto;
      background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));
      display:grid;place-items:center;font-size:2rem;font-weight:700;color:var(--accent);
      border:2px solid rgba(255,255,255,0.08);
      animation:spinIn 1s ease;
    }
    @keyframes spinIn{from{transform:rotate(-90deg) scale(0.5);opacity:0;}to{transform:rotate(0) scale(1);opacity:1;}}

    .btn{
      background:linear-gradient(90deg,var(--accent),var(--secondary));
      color:#021c1a;border:none;padding:0.8rem 1.4rem;border-radius:12px;font-weight:600;font-size:1rem;cursor:pointer;
      transition:transform 0.2s ease;display:inline-block;text-decoration:none;
    }
    .btn:hover{transform:scale(1.05);}

  </style>
</head>
<body>
  <div class="card">
    <div class="avatar" id="avatar">🙂</div>
    <h1 id="welcomeMsg">Willkommen zurück!</h1>
    <p>Schön, dass du wieder da bist. Viel Spaß auf deiner Seite!</p>
    <a href="main.html" class="btn">Zurück zur Startseite</a>
  </div>

  <script>
    const STORAGE_KEY = 'demo_username_v2';
    const name = localStorage.getItem(STORAGE_KEY);
    const welcomeMsg = document.getElementById('welcomeMsg');
    const avatar = document.getElementById('avatar');

    if(name){
      welcomeMsg.textContent = `Willkommen zurück, ${name}!`;
      avatar.textContent = name[0].toUpperCase();
    } else {
      welcomeMsg.textContent = 'Willkommen!';
      avatar.textContent = '—';
    }
  </script>
</body>
</html>
