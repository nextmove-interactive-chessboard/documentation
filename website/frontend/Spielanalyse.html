    <script>

        const canvas = document.getElementById('myCanvas');

                        ctx.fillRect(25 + i * 75, 25 + j * 75, 75, 75);

            ctx.stroke();


            
            // schwarzer König an aktueller Position

            const knightWhite2X = 40 + knightWhite2.x * 75;
            const knightWhite2Y = 30 + knightWhite2.y * 75;
            ctx.drawImage(document.getElementById("pw2"), knightWhite2X, knightWhite2Y, 40, 65);

            // schwarze Pferde
            const knightBlack1X = 40 + knightBlack1.x * 75;
            const knightBlack1Y = 30 + knightBlack1.y * 75;
            ctx.drawImage(document.getElementById("ps1"), knightBlack1X, knightBlack1Y, 40, 65);
            const knightBlack2X = 40 + knightBlack2.x * 75;
            const knightBlack2Y = 30 + knightBlack2.y * 75;
            ctx.drawImage(document.getElementById("ps2"), knightBlack2X, knightBlack2Y, 40, 65);

            // weiße Türme

            ctx.drawImage(document.getElementById("tw1"), towerWhite1X, towerWhite1Y, 40, 65);
            const towerWhite2X = 40 + towerWhite2.x * 75;
            const towerWhite2Y = 30 + towerWhite2.y * 75;
            ctx.drawImage(document.getElementById("tw2"), towerWhite2X, towerWhite2Y, 40, 65);

            // schwarze Türme
            const towerBlack1X = 40 + towerBlack1.x * 75;
            const towerBlack1Y = 30 + towerBlack1.y * 75;
            ctx.drawImage(document.getElementById("ts1"), towerBlack1X, towerBlack1Y, 40, 65);
            const towerBlack2X = 40 + towerBlack2.x * 75;
            const towerBlack2Y = 30 + towerBlack2.y * 75;
            ctx.drawImage(document.getElementById("ts2"), towerBlack2X, towerBlack2Y, 40, 65);

            // schwarze Bauern
            const pawnBlack1X = 40 + pawnBlack1.x * 75;
            const pawnBlack1Y = 30 + pawnBlack1.y * 75;
            ctx.drawImage(document.getElementById("bs1"), pawnBlack1X, pawnBlack1Y, 40, 65);
            const pawnBlack2X = 40 + pawnBlack2.x * 75;
            const pawnBlack2Y = 30 + pawnBlack2.y * 75;
            ctx.drawImage(document.getElementById("bs2"), pawnBlack2X, pawnBlack2Y, 40, 65);
            const pawnBlack3X = 40 + pawnBlack3.x * 75;
            const pawnBlack3Y = 30 + pawnBlack3.y * 75;
            ctx.drawImage(document.getElementById("bs3"), pawnBlack3X, pawnBlack3Y, 40, 65);
            const pawnBlack4X = 40 + pawnBlack4.x * 75;
            const pawnBlack4Y = 30 + pawnBlack4.y * 75;
            ctx.drawImage(document.getElementById("bs4"), pawnBlack4X, pawnBlack4Y, 40, 65);
            const pawnBlack5X = 40 + pawnBlack5.x * 75;
            const pawnBlack5Y = 30 + pawnBlack5.y * 75;
            ctx.drawImage(document.getElementById("bs5"), pawnBlack5X, pawnBlack5Y, 40, 65);
            const pawnBlack6X = 40 + pawnBlack6.x * 75;
            const pawnBlack6Y = 30 + pawnBlack6.y * 75;

    <script>
    // Schachzüge von der Match-Datei
    const moves = [
        "e4", "e5", "Nc3", "Nc6", "Bc4", "Nf6", "f4", "d6", "Nf3", "Bg4", "h3", 
        "Bxf3", "Qxf3", "Nd4", "Qd3", "exf4", "Qxd4", "c5", "Qf2", "g5", "d3", 
        "Qa5", "Bb5+", "Kd8", "Bd2", "Nxe4", "dxe4", "a6", "Nd5", "Qxb5", "Bc3", 
        "Qc4", "Bxh8", "Qxe4+", "Qe2", "Qxd5", "c4", "Qf5", "g4", "Qg6", "O-O", 
        "f6", "Rfe1", "Qf7", "Qe4", "Be7", "Qxb7", "Rc8", "Qb6+", "Kd7", "Qb7+", 
        "Kd8", "Re2", "Qg8", "Bxf6", "Bxf6", "Rae1", "Rc7", "Qb8+", "Rc8", "Qb6+", 
        "Kd7", "Qxa6", "Bd4+", "Kf1", "Bf6", "a3", "f3", "Re3", "f2", "Kxf2", "Bd4", 
        "Kf3", "Bxe3", "Kxe3", "Qe8+", "Kd2", "Qxe1+", "Kxe1", "Re8+", "Kd1", "Re5", 
        "b4", "Re3", "bxc5", "dxc5", "a4", "Rxh3", "a5", "Ra3", "Qa7+", "Kc8", "Qe7", 
        "Kb8", "Qxc5", "1-0"
    ];

    let isPlaying = false;
    let currentMoveIndex = 0;
    let animationTimeout = null;

    // Koordinaten-Mapping: a-h = 0-7, 1-8 = 7-0
    function fileToX(file) {
        return file.charCodeAt(0) - 97; // a=0, b=1, ..., h=7
    }

    function rankToY(rank) {
        return 8 - parseInt(rank); // 1=7, 2=6, ..., 8=0
    }

    // Alle Figuren als Array für leichtere Suche
    function getAllPieces() {
        return {
            'K': [kingWhite, kingBlack],
            'Q': [queenWhite, queenBlack],
            'R': [towerWhite1, towerWhite2, towerBlack1, towerBlack2],
            'B': [bishopWhite1, bishopWhite2, bishopBlack1, bishopBlack2],
            'N': [knightWhite1, knightWhite2, knightBlack1, knightBlack2],
            'P': [pawnWhite1, pawnWhite2, pawnWhite3, pawnWhite4, pawnWhite5, pawnWhite6, pawnWhite7, pawnWhite8,
                  pawnBlack1, pawnBlack2, pawnBlack3, pawnBlack4, pawnBlack5, pawnBlack6, pawnBlack7, pawnBlack8]
        };
    }

    // Parst algebraische Notation und führt den Zug aus
    function executeMove(moveNotation) {
        const isWhiteMove = currentMoveIndex % 2 === 0;
        let move = moveNotation;

        // Entferne Schach/Schachmatt-Symbole
        move = move.replace(/[+#]/, '');

        // Extrahiere Zielfeld (die letzten 2 Zeichen)
        const targetFile = move.charCodeAt(move.length - 2) - 97;
        const targetRank = 8 - parseInt(move[move.length - 1]);

        let piece = null;
        let startPiece = null;

        // Einfache Bauer-Bewegung (z.B. "e4")
        if (move.length === 2) {
            const startRank = isWhiteMove ? 6 : 1;
            const pawns = isWhiteMove ? [pawnWhite1, pawnWhite2, pawnWhite3, pawnWhite4, pawnWhite5, pawnWhite6, pawnWhite7, pawnWhite8] :
                                        [pawnBlack1, pawnBlack2, pawnBlack3, pawnBlack4, pawnBlack5, pawnBlack6, pawnBlack7, pawnBlack8];
            
            for (let pawn of pawns) {
                if (pawn.x === targetFile && (pawn.y === startRank || pawn.y === startRank + (isWhiteMove ? -1 : 1))) {
                    startPiece = {x: pawn.x, y: pawn.y};
                    piece = pawn;
                    break;
                }
            }
        }
        // Figur-Bewegung (z.B. "Nf3", "Bd3")
        else if (move[0] === move[0].toUpperCase() && move[0] !== 'O') {
            const figureType = move[0];
            let figurePieces = [];

            if (figureType === 'N') figurePieces = isWhiteMove ? [knightWhite1, knightWhite2] : [knightBlack1, knightBlack2];
            else if (figureType === 'B') figurePieces = isWhiteMove ? [bishopWhite1, bishopWhite2] : [bishopBlack1, bishopBlack2];
            else if (figureType === 'R') figurePieces = isWhiteMove ? [towerWhite1, towerWhite2] : [towerBlack1, towerBlack2];
            else if (figureType === 'Q') figurePieces = isWhiteMove ? [queenWhite] : [queenBlack];
            else if (figureType === 'K') figurePieces = isWhiteMove ? [kingWhite] : [kingBlack];

            for (let fig of figurePieces) {
                if (fig.x === targetFile && fig.y === targetRank) continue; // Zielfeld muss leer sein oder Gegner
                // Vereinfachte Logik: wähle erste verfügbare Figur (sollte Bewegungsregeln prüfen)
                if (!piece) {
                    startPiece = {x: fig.x, y: fig.y};
                    piece = fig;
                }
            }
        }

        if (piece && startPiece) {
            animateMovement(piece, startPiece.x, startPiece.y, targetFile, targetRank);
        }
    }

    function animateMovement(piece, fromX, fromY, toX, toY) {
        const duration = 400;
        const startTime = Date.now();

        function animate() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / duration, 1);

            piece.x = fromX + (toX - fromX) * progress;
            piece.y = fromY + (toY - fromY) * progress;
            drawBoardAndPieces();

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                piece.x = toX;
                piece.y = toY;
                drawBoardAndPieces();
                
                if (isPlaying && currentMoveIndex < moves.length - 1) {
                    currentMoveIndex++;
                    document.getElementById('moveCounter').textContent = Math.floor((currentMoveIndex + 1) / 2);
                    animationTimeout = setTimeout(() => {
                        executeMove(moves[currentMoveIndex]);
                    }, 500);
                } else if (currentMoveIndex >= moves.length - 1) {
                    isPlaying = false;
                }
            }
        }

        animate();
    }

    function startAutoPlay() {
        if (currentMoveIndex >= moves.length) {
            resetGame();
        }
        isPlaying = true;
        if (currentMoveIndex < moves.length) {
            executeMove(moves[currentMoveIndex]);
        }
    }

    function pauseAutoPlay() {
        isPlaying = false;
        if (animationTimeout) clearTimeout(animationTimeout);
    }

    function resetGame() {
        pauseAutoPlay();
        currentMoveIndex = 0;
        document.getElementById('moveCounter').textContent = '0';
        
        // Figuren auf Startposition zurücksetzen
        kingBlack = { x: 4, y: 0 };
        kingWhite = { x: 4, y: 7 };
        queenWhite = { x: 3, y: 7 };
        queenBlack = { x: 3, y: 0 };
        bishopWhite1 = { x: 2, y: 7 };
        bishopWhite2 = { x: 5, y: 7 };
        bishopBlack1 = { x: 2, y: 0 };
        bishopBlack2 = { x: 5, y: 0 };
        knightWhite1 = { x: 1, y: 7 };
        knightWhite2 = { x: 6, y: 7 };
        knightBlack1 = { x: 1, y: 0 };
        knightBlack2 = { x: 6, y: 0 };
        towerWhite1 = { x: 0, y: 7 };
        towerWhite2 = { x: 7, y: 7 };
        towerBlack1 = { x: 0, y: 0 };
        towerBlack2 = { x: 7, y: 0 };
        pawnWhite1 = { x: 0, y: 6 };
        pawnWhite2 = { x: 1, y: 6 };
        pawnWhite3 = { x: 2, y: 6 };
        pawnWhite4 = { x: 3, y: 6 };
        pawnWhite5 = { x: 4, y: 6 };
        pawnWhite6 = { x: 5, y: 6 };
        pawnWhite7 = { x: 6, y: 6 };
        pawnWhite8 = { x: 7, y: 6 };
        pawnBlack1 = { x: 0, y: 1 };
        pawnBlack2 = { x: 1, y: 1 };
